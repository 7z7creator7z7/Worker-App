<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Worker Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="top-popup"></div>
<!-- ===================== HELP BUTTON ===================== -->
<button id="helpBtn" class="help-btn">
    ❔
</button>


<div class="app">

    <!-- ================= HEADER ================= -->

    <div class="profile-card">

        <div class="profile-left">

            <img
                id="user-photo"
                src="https://placehold.co/120x120"
                class="avatar"
            >

            <div>

                <div id="user-name" class="username">
                    Foydalanuvchi
                </div>

                <div class="userid" id="user-id">
                    ID: -----
                </div>

            </div>

        </div>

        <div class="balance-box">

            <div class="balance-title">
                Hisobda
            </div>

            <div class="balance-value" id="balance">
                0 so'm
            </div>

        </div>

    </div>

    <!-- ================= INFO ================= -->

    <div class="info-grid">

        <div class="info-card">

            <div class="info-title">
                Ishlatilgan Pull
            </div>

            <div
                class="info-value"
                id="spentMoney">
                0 so'm
            </div>

        </div>

        <div class="info-card">

            <div class="info-title">
                Ishga Kelgan Kunlar
            </div>

            <div
                class="info-value"
                id="workedDays">
                0
            </div>

        </div>

    </div>

    <!-- ================= BUTTON ================= -->

    <button
        class="withdraw-btn"
        id="withdrawButton">

        💸 PULL YECHISH

    </button>

    <!-- ================= MODAL ================= -->

    <div
        class="modal hidden"
        id="withdrawModal">

        <div class="modal-box">

            <h2>
                Pull Yechish
            </h2>

            <label>

                Rasm

                <input
                    type="file"
                    id="imageInput"
                    accept="image/*">

            </label>

            <label>

                Nomi

                <input
                    type="text"
                    id="itemName"
                    placeholder="Masalan iPhone">

            </label>

            <label>

                Narxi

                <input
                    type="number"
                    id="itemPrice"
                    placeholder="100000">

            </label>

            <div class="modal-buttons">

                <button id="saveWithdraw">
                    Tayyor
                </button>

                <button id="closeWithdraw">
                    Bekor qilish
                </button>

            </div>

        </div>

    </div>

    <!-- 1.2 qismdan davom etadi -->
        <!-- ================= HISTORY ================= -->

    <div class="history-card">

        <div class="history-header">

            <span>
                Ishlatilgan Pull Ma'lumotlari
            </span>

            <span id="totalSpent">
                Jami: 0 so'm
            </span>

        </div>

        <div class="history-table">

            <div class="history-head">

                <div>Rasm</div>

                <div>Nomi</div>

                <div>Narxi</div>

            </div>

            <div id="historyList">

                <!-- JS qo'shadi -->

            </div>

        </div>

    </div>

    <!-- ================= HAFTALAR ================= -->

    <div class="week-card">

        <div class="week-top">

            <button id="prevWeek">
                ◀ Oldingi
            </button>

            <span id="weekTitle">
                HAFTA
            </span>

            <button id="nextWeek">
                Keyingi ▶
            </button>

        </div>

        <div class="days-grid">

            <label class="day">
                <input type="checkbox" id="monday">
                <span>Dushanba</span>
            </label>

            <label class="day">
                <input type="checkbox" id="tuesday">
                <span>Seshanba</span>
            </label>

            <label class="day">
                <input type="checkbox" id="wednesday">
                <span>Chorshanba</span>
            </label>

            <label class="day">
                <input type="checkbox" id="thursday">
                <span>Payshanba</span>
            </label>

            <label class="day">
                <input type="checkbox" id="friday">
                <span>Juma</span>
            </label>

            <label class="day">
                <input type="checkbox" id="saturday">
                <span>Shanba</span>
            </label>

            <label class="day sunday">
                <input type="checkbox" id="sunday">
                <span>Yakshanba</span>
            </label>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
